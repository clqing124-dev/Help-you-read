<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帮你读书 - Qing阅读分析法 | AI智能精读</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f7fb;
            font-family: 'Inter', sans-serif;
            color: #1e293b;
            line-height: 1.5;
            padding: 1.5rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .hero {
            text-align: center;
            margin-bottom: 2rem;
        }

        .hero h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1E3C72, #2A5298);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .badge {
            background: #e9eef3;
            display: inline-block;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }

        .upload-card {
            background: white;
            border-radius: 28px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.05);
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid #e2e8f0;
        }

        .upload-area {
            border: 2px dashed #cbd5e1;
            border-radius: 24px;
            background: #fafcff;
            padding: 2.5rem 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .upload-area:hover {
            border-color: #3b82f6;
            background: #f0f9ff;
        }

        .upload-icon {
            font-size: 3rem;
            color: #3b82f6;
            margin-bottom: 0.75rem;
        }

        .file-info {
            margin-top: 1rem;
            font-size: 0.9rem;
            font-weight: 500;
            color: #0f3b5c;
        }

        .format-hint {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 0.5rem;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 1.8rem;
        }

        .btn {
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            font-family: inherit;
        }

        .btn-primary {
            background: #1e3c72;
            color: white;
        }

        .btn-primary:hover {
            background: #0f2b4f;
        }

        .btn-outline {
            background: #f1f5f9;
            color: #1e293b;
        }

        .btn-outline:hover {
            background: #e2e8f0;
        }

        .report-container {
            background: white;
            border-radius: 28px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.05);
            padding: 1.8rem 2rem;
            border: 1px solid #eef2f6;
        }

        .report-header {
            border-bottom: 2px solid #eef2ff;
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
        }

        .loading {
            text-align: center;
            padding: 2rem;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e2e8f0;
            border-top-color: #1e3c72;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .analysis-content {
            line-height: 1.7;
        }

        .analysis-content h1,
        .analysis-content h2 {
            margin-top: 1.5rem;
            margin-bottom: 0.75rem;
            color: #0f172a;
        }

        .analysis-content h2 {
            border-left: 4px solid #1e3c72;
            padding-left: 1rem;
        }

        .analysis-content h3 {
            margin-top: 1rem;
            margin-bottom: 0.5rem;
            color: #334155;
        }

        .analysis-content ul,
        .analysis-content ol {
            margin-left: 1.5rem;
            margin-bottom: 1rem;
        }

        .analysis-content p {
            margin-bottom: 0.75rem;
        }

        .analysis-content code {
            background: #f1f5f9;
            padding: 0.2rem 0.4rem;
            border-radius: 6px;
            font-size: 0.85rem;
        }

        .error-message {
            background: #fef2f2;
            color: #dc2626;
            padding: 1rem;
            border-radius: 16px;
            text-align: center;
        }

        .footer {
            text-align: center;
            font-size: 0.75rem;
            color: #6c86a3;
            margin-top: 2rem;
        }

        @media (max-width: 680px) {
            body {
                padding: 1rem;
            }

            .upload-card,
            .report-container {
                padding: 1.2rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="hero">
            <h1>📖 帮你读书</h1>
            <div class="badge">⚡ 基于 DeepSeek AI + Qing阅读分析法 · 智能精读引擎</div>
            <p style="margin-top: 0.75rem; color: #475569;">上传书籍文档，AI 将严格按照 Qing 阅读分析法生成完整深度报告</p>
        </div>

        <div class="upload-card">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon"><i class="fas fa-cloud-upload-alt"></i></div>
                <p><strong>点击或拖拽上传书籍文档</strong></p>
                <p style="font-size: 0.85rem; color: #64748b;">支持 PDF、TXT、Word、EPUB、MOBI 等格式</p>
                <input type="file" id="fileInput" accept=".pdf,.txt,.docx,.epub,.mobi" style="display: none;">
                <div class="file-info" id="fileNameDisplay"></div>
                <div class="format-hint"><i class="fas fa-info-circle"></i> 最大 50MB，AI 将深度分析书籍核心内容</div>
            </div>
            <div class="btn-group">
                <button class="btn btn-primary" id="analyzeBtn"><i class="fas fa-magic"></i> 开始分析</button>
                <button class="btn btn-outline" id="resetBtn"><i class="fas fa-undo-alt"></i> 重置</button>
            </div>
        </div>

        <div id="reportContainer" class="report-container" style="display: none;">
            <div class="report-header">
                <h2><i class="fas fa-book-open"></i> 《<span id="bookTitle">未知书籍</span>》· Qing阅读分析报告</h2>
            </div>
            <div id="analysisContent"></div>
            <div class="footer">
                <i class="fas fa-brain"></i> 分析由 DeepSeek AI 驱动，严格遵循 Qing 阅读分析法（检视阅读→分析阅读→评论→主题阅读）
            </div>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const resetBtn = document.getElementById('resetBtn');
        const reportContainer = document.getElementById('reportContainer');
        const bookTitleSpan = document.getElementById('bookTitle');
        const analysisContentDiv = document.getElementById('analysisContent');

        let selectedFile = null;

        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#3b82f6';
            uploadArea.style.background = '#f0f9ff';
        });
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.style.borderColor = '#cbd5e1';
            uploadArea.style.background = '#fafcff';
        });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#cbd5e1';
            uploadArea.style.background = '#fafcff';
            if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) handleFile(e.target.files[0]);
        });

        function handleFile(file) {
            const validExtensions = ['.pdf', '.txt', '.docx', '.epub', '.mobi'];
            const ext = '.' + file.name.split('.').pop().toLowerCase();
            if (!validExtensions.includes(ext)) {
                alert('不支持的文件格式，请上传 PDF、TXT、Word、EPUB 或 MOBI 文件');
                return;
            }
            selectedFile = file;
            fileNameDisplay.innerHTML = `✅ 已选择: ${file.name} (${(file.size / 1024).toFixed(1)} KB)`;
        }

        resetBtn.addEventListener('click', () => {
            selectedFile = null;
            fileInput.value = '';
            fileNameDisplay.innerHTML = '';
            reportContainer.style.display = 'none';
        });

        analyzeBtn.addEventListener('click', async () => {
            if (!selectedFile) {
                alert('请先选择一本书籍文件');
                return;
            }

            reportContainer.style.display = 'block';
            analysisContentDiv.innerHTML = `
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>🤖 AI 正在深度分析书籍内容，严格按照 Qing 阅读分析法生成报告...</p>
                <p style="font-size: 0.8rem; color: #64748b; margin-top: 0.5rem;">首次分析可能需要 30-60 秒，请耐心等待</p>
            </div>
        `;
            bookTitleSpan.innerText = selectedFile.name.replace(/\.[^/.]+$/, '');

            const formData = new FormData();
            formData.append('file', selectedFile);

            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();

                if (result.success) {
                    // 将 Markdown 渲染为 HTML
                    const htmlContent = markedParse(result.analysis);
                    analysisContentDiv.innerHTML = `<div class="analysis-content">${htmlContent}</div>`;
                } else {
                    analysisContentDiv.innerHTML = `<div class="error-message"><i class="fas fa-exclamation-triangle"></i> 分析失败: ${result.error}</div>`;
                }
            } catch (error) {
                analysisContentDiv.innerHTML = `<div class="error-message"><i class="fas fa-exclamation-triangle"></i> 请求失败: ${error.message}</div>`;
            }
        });

        // 简单的 Markdown 解析（支持标题、列表、粗体等）
        function markedParse(md) {
            let html = md;
            // 标题
            html = html.replace(/^### (.*$)/gm, '<h3>$1</h3>');
            html = html.replace(/^## (.*$)/gm, '<h2>$1</h2>');
            html = html.replace(/^# (.*$)/gm, '<h1>$1</h1>');
            // 粗体
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            // 斜体
            html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
            // 无序列表
            html = html.replace(/^\* (.*$)/gm, '<li>$1</li>');
            html = html.replace(/^- (.*$)/gm, '<li>$1</li>');
            // 有序列表
            html = html.replace(/^\d+\. (.*$)/gm, '<li>$1</li>');
            // 包裹列表
            html = html.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');
            // 段落
            html = html.replace(/\n\n/g, '</p><p>');
            html = '<p>' + html + '</p>';
            // 清理空标签
            html = html.replace(/<p><\/p>/g, '');
            html = html.replace(/<p>\s*<h/g, '<h');
            html = html.replace(/<\/h\d>\s*<\/p>/g, '</h>');
            // 代码块
            html = html.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
            // 行内代码
            html = html.replace(/`(.*?)`/g, '<code>$1</code>');
            return html;
        }
    </script>
</body>

</html>
